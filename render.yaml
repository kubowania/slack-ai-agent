services:
  - type: web
    name: slack-ai-agent
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    # Required: set these in Render Dashboard (sync: false = secret, not in repo)
    # SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_SIGNING_SECRET, SLACK_PRIVATE_CHANNEL_ID, OPENAI_API_KEY
    envVars:
      - key: NODE_ENV
        value: production
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_PRIVATE_CHANNEL_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COMPANY_NAME
        value: Your Company Name
      - key: COMPANY_PRODUCT
        value: Your Commercial Product
    healthCheckPath: /health
    disk:
      name: logs
      mountPath: /opt/render/project/src/logs
      sizeGB: 1
